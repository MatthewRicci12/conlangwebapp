<h5 class="fw-bold mb-3">Edit glyph string</h5>
<form id="edit_ve" onsubmit="submitForm()">
    <div class="mb-3">
    <label class="form-label fw-medium">Part of speech</label>
    {{ form.part_of_speech }}
    </div>
    <div class="mb-3">
    <label class="form-label fw-medium">Definition</label>
    {{ form.definition }}
    </div>
    <div class="d-flex gap-2">
    <input type="submit" value="Submit" class="btn btn-primary btn-sm" form="edit_ve">
    <button type="button" class="btn btn-outline-danger btn-sm" onclick="closeModal()">Close</button>
    </div>
</form>
