<h5 class="fw-bold mb-3">Edit text</h5>
<form id="edit_text" onsubmit="submitForm()">
    <div class="mb-3">
    <label class="form-label fw-medium">Title</label>
    {{ form.title }}
    </div>
    <div class="mb-3">
    <label class="form-label fw-medium">Body</label>
    {{ form.body }}
    </div>
    <div class="d-flex gap-2">
    <input type="submit" class="btn btn-primary btn-sm" form="edit_text">
    <button type="button" class="btn btn-outline-danger btn-sm" onclick="closeModal()">Close</button>
  </div>
</form>
