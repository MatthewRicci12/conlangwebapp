<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Conlang App</title>
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js" integrity="sha384-/TgkGk7p307TH7EXJDuUlgG3Ce1UVolAOFopFekQkkXihi5u/6OCvVKyz1W+idaz" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    {% load static %}
    <!-- So I can use CSRF tokens in more than just forms. -->
    <link rel="stylesheet" href="{% static 'styles.css' %}">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <script>
      document.addEventListener('htmx:configRequest', function(evt) {
        evt.detail.headers['X-CSRFToken'] = document.querySelector('meta[name="csrf-token"]').getAttribute('content');
      });
    </script>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-md">
    <div id="tabs">
        <a href="{% url 'index' %}" class="navbar-brand fw-bold">ConlangApp</a>
        <div class="navbar-nav flex-row gap-1">
        <a href="{% url 'vocabulary-list' %}" class="nav-link active fw-semibold">Vocabulary List</a>
        <a href="{% url 'phonology-and-glyphs-tab' %}" class="nav-link">Glyphs and Phonology Mappings</a>
        <a href="{% url 'grammar-tab' %}" class="nav-link">Grammar Notes</a>
        </div>
    </div>
</nav>

<div class="mb-4">
  <h1 class="fw-bold">Grammar</h1>
  <p class="text-secondary">Browse and manage your conlang grammar notes.</p>
</div>
{% if gns %}
    {% for gn in gns %}
        <!--GRAMMAR NOTE DIV-->
        <div>
            <h1>{{gn.title}}</h1>
            <p>{{gn.body}}</p>
            <!--UPDATE/DELETE BUTTONS-->
            <button hx-get="{% url 'modal' %}" hx-target="body" hx-vals='{"model": "GrammarNote", "action": "update", "primary_key": {{ gn.gn_id }}}'>Update</button>
            <button hx-get="{% url 'grammar-tab' %}" hx-target="body" hx-vals='{"model": "GrammarNote", "action": "delete", "primary_key": {{ gn.gn_id }}}'>Delete</button>
        </div>
    {% endfor %}
{% endif %}

</body>
</html>`
