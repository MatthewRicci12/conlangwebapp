<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Conlang App</title>

    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js" integrity="sha384-/TgkGk7p307TH7EXJDuUlgG3Ce1UVolAOFopFekQkkXihi5u/6OCvVKyz1W+idaz" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    {% load static %}
    <link rel="stylesheet" href="{% static 'styles.css' %}">
    <script src="{% static '../static/toastevents.js' %}" defer></script>

    <!-- So I can use CSRF tokens in more than just forms. -->
    <meta name="csrf-token" content="{{ csrf_token }}">
    <script>
      document.addEventListener('htmx:configRequest', function(evt) {
        evt.detail.headers['X-CSRFToken'] = document.querySelector('meta[name="csrf-token"]').getAttribute('content');
      });
    </script>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-md">
    <div id="tabs">
        <a href="{% url 'index' %}" class="navbar-brand fw-bold">ConlangApp</a>
        <div class="navbar-nav flex-row gap-1">
        <a href="{% url 'vocabulary-list' %}" class="nav-link active fw-semibold">Vocabulary List</a>
        <a href="{% url 'phonology-and-glyphs-tab' %}" class="nav-link">Glyphs and Phonology Mappings</a>
        <a href="{% url 'grammar-tab' %}" class="nav-link">Grammar Notes</a>
        </div>
    </div>
</nav>

<div class="d-flex gap-3 p-3" style="min-height: calc(100vh - 56px);" id="extract_text_master_container">
    {% load hoverable_words %}
  <div id="current_text" class="card shadow-sm flex-grow-1 p-4" style="font-size: 1.0625rem; line-height: 1.9; overflow-y: auto; display: block;">
    {{ text_content|hoverable_words:params }}
  </div>

  {% if form_up %}
  <div style="width: 360px; flex-shrink: 0;">
    {% include 'partials/current_form.html' %}
  </div>
  {% endif %}
</div>

<div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">
  <div id="liveToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true" data-bs-autohide="true" data-bs-delay="3000">

    <div class="toast-header">
    <strong class="me-auto">Success</strong>
    <small>Just now</small>
    <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
    </div>

    <div class="toast-body">
    Your submission was saved.
    </div>

  </div>
</div>

<script>
  var container = document.getElementById('current_text');

  container.addEventListener('click', (e) => {
    if (e.target.classList.contains('word')) {
      submitTokens(e.target.firstChild.data);
    }
  });

  container.addEventListener('mouseup', () => {
    const selection = window.getSelection().toString().trim();
    if (selection.length > 0) submitTokens(selection);
  });

  function submitTokens(tokens) {
    const selected_form = {% if not form_up %}'vocabulary_entry_form'{% else %}'{{ form_div_context.selected_form }}'{% endif %};
    htmx.ajax('POST', '{% url "user-clicks-text" text_id %}', {
      target: 'body',
      values: { form_up: 1, token: tokens, selected_form }
    }).catch(() => {});
  }
</script>
</body>
</html>
